services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - app-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Modo desarrollo: hot-reload con volumenes montados
  web-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DEBUG=true
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./dist:/app/dist
      - app-data:/app/data
    command: >
      sh -c "npm run build && npm run dev"
    restart: unless-stopped
    profiles:
      - dev

volumes:
  app-data:
